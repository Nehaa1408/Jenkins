spring.application.name=apigateway
server.port=9999

spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://USER-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.server.webflux.routes[1].id=movie-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://MOVIE-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/movies/**

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
eureka.instance.prefer-ip-address=true

